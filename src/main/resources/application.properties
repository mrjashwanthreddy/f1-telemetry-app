# F1 Telemetry Application Configuration
server.port=8080

# UDP Server Configuration
f1.udp.host=127.0.0.1
f1.udp.port=20777

# JPA Configuration (Fallback database credentials for standalone .exe execution)
spring.datasource.url=jdbc:postgresql://localhost:5432/f1telemetry
spring.datasource.username=f1user
spring.datasource.password=f1pass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (In production, use a secure externalized secret)
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expiration=86400000

# Logging
logging.level.com.f1telemetry=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Spring Boot
spring.application.name=f1-telemetry
spring.docker.compose.lifecycle-management=start-only
